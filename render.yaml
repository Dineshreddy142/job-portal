services:
  - type: web
    name: job-portal-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    rootDir: backend
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: job-portal-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://job-portal-backend.onrender.com/api
        # NOTE: You will need to change the domain part to match your actual backend Render URL later.
