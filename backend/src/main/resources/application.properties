spring.application.name=backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/job_portal?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@example.com}
spring.mail.password=${MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Thymeleaf Email Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# JWT Secret (must be at least 256-bit, loaded from environment)
jwt.secret=${JWT_SECRET:CHANGE_THIS_IN_PRODUCTION_USE_A_RANDOM_64_CHAR_HEX_STRING_HERE}
jwt.expiration=3600000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=-1
file.upload-dir=uploads/resumes

# Base URL used in password reset emails (frontend URL)
app.reset.base-url=${FRONTEND_URL:http://localhost:3000}

# CORS allowed origins (comma-separated for production)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Admin credentials (set via environment variables)
app.admin.email=${ADMIN_EMAIL:admin@jobportal.com}
app.admin.password=${ADMIN_PASSWORD:changeme}
app.security-admin.email=${SECURITY_ADMIN_EMAIL:security@jobportal.com}
app.security-admin.password=${SECURITY_ADMIN_PASSWORD:changeme}

# IMAP Mail Collection (optional - leave blank to use mock data)
# For Gmail: host=imap.gmail.com, use an App Password
mail.imap.host=${IMAP_HOST:}
mail.imap.username=${IMAP_USERNAME:}
mail.imap.password=${IMAP_PASSWORD:}

# Google OAuth2
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
