version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobportal-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-https://job-portal-brown-kappa.vercel.app}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://job-portal-brown-kappa.vercel.app}
    networks:
      - jobportal-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobportal-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - jobportal-network
    restart: unless-stopped

networks:
  jobportal-network:
    driver: bridge
